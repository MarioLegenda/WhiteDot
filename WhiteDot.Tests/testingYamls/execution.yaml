select:
  find_user:
    sql: "SELECT * FROM employees.employee WHERE id = @id"
    properties:
      - first_name:FirstName
      - last_name:LastName
      - id:Id
      - birth_date:BirthDate
      - hire_date:HireDate
    if_exists:
      sql: "SELECT id FROM employees.employee WHERE id = @id"
  find_many_users:
    sql: "SELECT * FROM employees.employee LIMIT 10"
    properties:
      - first_name:FirstName
      - last_name:LastName
      - id:Id
      - birth_date:BirthDate
      - hire_date:HireDate
write:
  insert_user:
    sql: "INSERT INTO employees.employee (first_name, last_name, birth_date, gender, hire_date) VALUES (@first_name, @last_name, @birth_date, @gender::employees.employee_gender, @hire_date)"
  update_user:
    sql: "UPDATE employees.employee SET first_name = @first_name, last_name = @last_name WHERE first_name = @where_first_name AND last_name = @where_last_name"
  delete_user:
    sql: "DELETE FROM employees.employee WHERE first_name = @name AND last_name = @last_name"