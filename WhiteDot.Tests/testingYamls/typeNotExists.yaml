select:
  find_user:
    sql: "SELECT * FROM employees.employee WHERE id = :id"
    properties:
      - first_name:FirstName
      - last_name:LastName
      - id:Id
      - birth_date:BirthDate
      - hire_date:HireDate
write:
  insert_user:
    sql: "INSERT INTO table (id, name) VALUES (:id, :name)"