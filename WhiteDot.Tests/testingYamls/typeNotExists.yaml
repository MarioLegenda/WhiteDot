    find_user:
      sql: "SELECT * FROM employees.employee WHERE id = :id"
      namespace: WhiteDot.Tests.Namepace.EmployeeModel
      assembly: WhiteDot.Tests
      properties:
        - first_name to FirstName
        - last_name to LastName
        - id to Id
        - birth_date to BirthDate
        - hire_date to HireDate